kind = "web"
previewPath = "/"
title = "Marble Sort"
version = "1.0.0"
id = "artifacts/marble-sort"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23921

[services.development]
run = "pnpm --filter @workspace/marble-sort run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marble-sort", "run", "build" ]
publicDir = "artifacts/marble-sort/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23921"
BASE_PATH = "/"
